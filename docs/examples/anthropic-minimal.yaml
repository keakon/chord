# Anthropic minimal — single provider, single key, single pool
#
# Pair with ~/.config/chord/auth.yaml:
#
#   anthropic:
#     - "$ANTHROPIC_API_KEY"

providers:
  anthropic:
    type: messages
    api_url: https://api.anthropic.com/v1/messages
    models:
      claude-opus-4.8:
        limit:
          context: 1000000
          output: 128000
        thinking:
          type: adaptive
          effort: medium
        modalities:
          input: [text, image, pdf]

model_pools:
  default:
    - anthropic/claude-opus-4.8

context:
  compaction:
    threshold: 0.8
desktop_notification: true
log_level: info
