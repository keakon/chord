# Team-ready project baseline
#
# Keep the shared layout split across real files:
# - ~/.config/chord/config.yaml          personal defaults + providers
# - ~/.config/chord/auth.yaml            personal credentials
# - <repo>/.chord/config.yaml            shared project defaults
# - <repo>/.chord/agents/*.md            shared agent roles
#
# See docs/examples/examples-team*.md for the full multi-file layout.

providers:
  anthropic:
    type: messages
    api_url: https://api.anthropic.com/v1/messages
    models:
      claude-opus-4.8:
        limit:
          context: 1000000
          output: 128000
        thinking:
          type: adaptive
          effort: medium

model_pools:
  thinking:
    - anthropic/claude-opus-4.8
  fast:
    - anthropic/claude-opus-4.8

context:
  compaction:
    threshold: 0.8
desktop_notification: true
log_level: info
