# ---------------------------------------------------------------------------
# Per-agent strictness — committed under <repo>/.chord/agents/
# ---------------------------------------------------------------------------
# Example: <repo>/.chord/agents/builder.md
#
#   ---
#   name: builder
#   mode: main
#   model_pools: [thinking]
#   permission:
#     Read: allow
#     Grep: allow
#     Glob: allow
#     Write: ask
#     Edit: ask
#     Delete: ask
#     Shell:
#       "go test ./...": allow
#       "go build ./...": allow
#       "git status": allow
#       "git diff": allow
#       "rm *": deny
#       "sudo *": deny
#   ---
#   You are the team's main coder. Default to small, focused commits.
#   Always run `go test ./...` before considering a task complete.
