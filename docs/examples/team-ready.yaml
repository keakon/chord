# Team-ready: strict permissions, hooks-based auditing, project-level overrides
#
# This is the kind of config you would commit as ~/.config/chord/config.yaml
# **plus** a project-level .chord/config.yaml in your team repository.
#
# Pair with ~/.config/chord/auth.yaml that has the relevant API keys, and a
# scripts/chord-hooks/ directory in your repo that contains the hook scripts.

# ---------------------------------------------------------------------------
# Global ~/.config/chord/config.yaml
# ---------------------------------------------------------------------------

providers:
  anthropic:
    type: messages
    api_url: https://api.anthropic.com/v1/messages
    models:
      claude-opus-4.7:
        limit:
          context: 1000000
          output: 128000
        thinking:
          type: adaptive
          effort: medium

model_pools:
  thinking:
    - anthropic/claude-opus-4.7

context:
  auto_compact: true
  compact_threshold: 0.8

desktop_notification: true
log_level: info

# ---------------------------------------------------------------------------
# Project-level <repo>/.chord/config.yaml (commit this)
# ---------------------------------------------------------------------------
