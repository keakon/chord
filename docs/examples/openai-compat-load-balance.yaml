# OpenAI-compatible gateway: multi-key rotation + endpoint failover
#
# Pair with ~/.config/chord/auth.yaml:
#
#   primary:
#     - "$PRIMARY_KEY_A"
#     - "$PRIMARY_KEY_B"
#     - "$PRIMARY_KEY_C"
#   backup:
#     - "$BACKUP_KEY"

providers:
  primary:
    type: chat-completions
    api_url: https://gateway.example.com/v1/chat/completions
    models:
      llama3-70b: &big
        limit:
          context: 128000
          input: 128000
          output: 32768
      llama3-8b: &small
        limit:
          context: 32000
          input: 32000
          output: 8000

  backup:
    type: chat-completions
    api_url: https://backup.example.org/v1/chat/completions
    models:
      llama3-70b: *big
      llama3-8b: *small

model_pools:
  big:
    - primary/llama3-70b
    - backup/llama3-70b
  small:
    - primary/llama3-8b
    - backup/llama3-8b

context:
  compact_threshold: 0.85
  compaction:
    model_pool: small

log_level: info
