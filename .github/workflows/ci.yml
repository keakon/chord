name: ci

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - "docs/**"
      - "website/**"
      - "scripts/sync-docs.mjs"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - "docs/**"
      - "website/**"
      - "scripts/sync-docs.mjs"

permissions:
  contents: read

jobs:
  test:
    name: Test with coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Test
        env:
          MIN_COVERAGE: "65.0"
        shell: bash
        run: |
          set -euo pipefail
          coverage_file="coverage.out"
          go test -timeout=2m -coverprofile="${coverage_file}" ./...
          cover_output="$(go tool cover -func="${coverage_file}")"
          printf '%s\n' "${cover_output}"
          total_coverage="$(printf '%s\n' "${cover_output}" | awk '/^total:/ {gsub(/%/, "", $3); print $3}')"
          if [[ -z "${total_coverage}" ]]; then
            echo "failed to parse total coverage" >&2
            exit 1
          fi
          awk -v total="${total_coverage}" -v min="${MIN_COVERAGE}" 'BEGIN {
            if (total + 0 < min + 0) {
              printf("coverage check failed: total %.1f%% < required %.1f%%\n", total + 0, min + 0)
              exit 1
            }
            printf("coverage check passed: total %.1f%% >= required %.1f%%\n", total + 0, min + 0)
          }'

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Vet
        run: |
          go vet ./...

  race:
    name: Race detector
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Test with -race
        shell: bash
        run: |
          set -euo pipefail
          # The race detector slows execution 2-20x, so this job runs in
          # parallel with the coverage job rather than gating on it.
          # -count=1 disables the test cache so the race instrumentation
          # actually runs on every CI invocation.
          go test -race -count=1 -timeout=10m ./...

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: |
          staticcheck -checks 'all,-ST1000' ./...

  gopls:
    name: Gopls diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Install gopls
        run: |
          go install golang.org/x/tools/gopls@latest

      - name: Gopls check
        run: |
          git ls-files -z '*.go' | xargs -0 gopls check

  gofmt:
    name: Check Go formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Check goimports
        shell: bash
        run: |
          set -euo pipefail
          out="$(goimports -l -local github.com/keakon/chord .)"
          if [[ -n "${out}" ]]; then
            echo "The following files need goimports formatting:"
            echo "${out}"
            echo "Run: goimports -w -local github.com/keakon/chord ."
            exit 1
          fi
