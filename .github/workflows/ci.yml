name: ci

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - "docs/**"
      - "website/**"
      - "scripts/sync-docs.mjs"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "**/*.mdx"
      - "docs/**"
      - "website/**"
      - "scripts/sync-docs.mjs"

permissions:
  contents: read

jobs:
  test:
    name: Test with coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Test
        env:
          MIN_COVERAGE: "70.0"
          CHORD_TEST_COUNT: "1"
        run: scripts/check_ci_local.sh

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Audit dependencies
        run: scripts/check_deps.sh

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Vet
        run: |
          go vet ./...

  race:
    name: Race detector
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Test with -race
        run: scripts/check_ci_race.sh

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: |
          staticcheck -checks 'all,-ST1000' ./...

  gopls:
    name: Gopls diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Install gopls
        run: |
          go install golang.org/x/tools/gopls@latest

      - name: Gopls check
        run: |
          git ls-files -z '*.go' | xargs -0 gopls check

  gofmt:
    name: Check Go formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps -test ./... >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Check goimports
        shell: bash
        run: |
          set -euo pipefail
          out="$(goimports -l -local github.com/keakon/chord .)"
          if [[ -n "${out}" ]]; then
            echo "The following files need goimports formatting:"
            echo "${out}"
            echo "Run: goimports -w -local github.com/keakon/chord ."
            exit 1
          fi
