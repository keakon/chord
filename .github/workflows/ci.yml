name: ci

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"

permissions:
  contents: read

jobs:
  test:
    name: Test with coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: |
          set -euo pipefail
          go test -timeout=2m -coverprofile=coverage.out ./...
          go tool cover -func=coverage.out
          total="$(go tool cover -func=coverage.out | awk '/^total:/ {gsub(/%/, "", $3); print $3}')"
          awk -v total="${total}" -v min="65.0" 'BEGIN {
            if (total + 0 < min) {
              printf("coverage %.1f%% is below required %.1f%%\n", total, min)
              exit 1
            }
            printf("coverage %.1f%% meets required %.1f%%\n", total, min)
          }'

  vet:
    name: Vet
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: |
          go vet ./...

  staticcheck:
    name: Staticcheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest

      - name: Staticcheck
        run: |
          staticcheck -checks 'all,-ST1000' ./...

  gopls:
    name: Gopls diagnostics
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install gopls
        run: |
          go install golang.org/x/tools/gopls@latest

      - name: Gopls check
        run: |
          git ls-files '*.go' | xargs gopls check

  gofmt:
    name: Check Go formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Install goimports
        run: go install golang.org/x/tools/cmd/goimports@latest

      - name: Check goimports
        shell: bash
        run: |
          set -euo pipefail
          out="$(goimports -l -local github.com/keakon/chord .)"
          if [[ -n "${out}" ]]; then
            echo "The following files need goimports formatting:"
            echo "${out}"
            echo "Run: goimports -w -local github.com/keakon/chord ."
            exit 1
          fi
