name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.7.0). Must already exist in the repo."
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    # `push` to a v* tag runs on that tag. `workflow_dispatch` runs on main but
    # we release the explicitly requested tag, so verify it looks like a tag.
    if: ${{ github.event_name == 'push' || startsWith(inputs.tag, 'v') }}
    steps:
      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.tag.outputs.tag }}
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps ./cmd/chord >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Build release assets
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG}"
          commit="$(git rev-parse --short HEAD)"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w \
            -X github.com/keakon/chord/internal/buildinfo.Version=${version} \
            -X github.com/keakon/chord/internal/buildinfo.Commit=${commit} \
            -X github.com/keakon/chord/internal/buildinfo.BuildTime=${build_time} \
            -X github.com/keakon/chord/internal/buildinfo.Dirty=false"
          mkdir -p dist build

          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "${target}"
            name="chord-${version}-${goos}-${goarch}"
            ext=""
            if [[ "${goos}" == "windows" ]]; then
              ext=".exe"
            fi

            out="build/${name}/chord${ext}"
            mkdir -p "$(dirname "${out}")"

            GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags "${ldflags}" \
              -o "${out}" ./cmd/chord/

            cp LICENSE "build/${name}/"
            if [[ "${goos}" == "windows" ]]; then
              (cd build && zip -qr "../dist/${name}.zip" "${name}")
            else
              tar -C build -czf "dist/${name}.tar.gz" "${name}"
            fi
          done

          (cd dist && sha256sum * > SHA256SUMS)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${RELEASE_TAG}" dist/* \
            --target "$(git rev-parse HEAD)" \
            --title "${RELEASE_TAG}" \
            --generate-notes
