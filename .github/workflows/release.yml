name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Warm Go build cache
        shell: bash
        run: |
          set -euo pipefail
          log="$(mktemp)"
          if ! go list -deps ./cmd/chord >/dev/null 2>"${log}"; then
            cat "${log}" >&2
            rm -f "${log}"
            exit 1
          fi
          rm -f "${log}"

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME}"
          commit="$(git rev-parse --short HEAD)"
          build_time="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          ldflags="-s -w \
            -X github.com/keakon/chord/internal/buildinfo.Version=${version} \
            -X github.com/keakon/chord/internal/buildinfo.Commit=${commit} \
            -X github.com/keakon/chord/internal/buildinfo.BuildTime=${build_time} \
            -X github.com/keakon/chord/internal/buildinfo.Dirty=false"
          mkdir -p dist build

          targets=(
            "darwin amd64"
            "darwin arm64"
            "linux amd64"
            "linux arm64"
            "windows amd64"
          )

          for target in "${targets[@]}"; do
            read -r goos goarch <<< "${target}"
            name="chord-${version}-${goos}-${goarch}"
            ext=""
            if [[ "${goos}" == "windows" ]]; then
              ext=".exe"
            fi

            out="build/${name}/chord${ext}"
            mkdir -p "$(dirname "${out}")"

            GOOS="${goos}" GOARCH="${goarch}" \
              go build -trimpath -ldflags "${ldflags}" \
              -o "${out}" ./cmd/chord/

            cp LICENSE "build/${name}/"
            if [[ "${goos}" == "windows" ]]; then
              (cd build && zip -qr "../dist/${name}.zip" "${name}")
            else
              tar -C build -czf "dist/${name}.tar.gz" "${name}"
            fi
          done

          (cd dist && sha256sum * > SHA256SUMS)

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
