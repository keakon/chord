name: docs

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "website/**"
      - "scripts/sync-docs.mjs"
      - "README.md"
      - "README_CN.md"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "docs/**"
      - "website/**"
      - "scripts/sync-docs.mjs"
      - "README.md"
      - "README_CN.md"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Avoid concurrent deploys clobbering each other.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  markdown-lint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v17
        with:
          config: .markdownlint-cli2.jsonc

  link-check:
    name: Link check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-cache-${{ github.run_id }}
          restore-keys: lychee-cache-

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Scan docs and top-level user-facing markdown.
          # Skip website/ (synced) and .internal-docs/ (separate maintainer subtree).
          args: >-
            --no-progress
            --cache
            --max-cache-age 30d
            --max-concurrency 16
            --accept 200,206,429
            docs/
            README.md
            README_CN.md
            CONTRIBUTING.md
            SECURITY.md
            CODE_OF_CONDUCT.md
          fail: true

  build:
    name: Build site
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: website
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install
        run: npm ci || npm install

      - name: Build
        run: npm run build

      - name: Upload artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: [markdown-lint, link-check, build]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
